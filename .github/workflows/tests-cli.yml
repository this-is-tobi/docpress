name: Tests - cli

on:
  workflow_call:
    inputs:
      NODE_VERSION:
        required: true
        type: string
      BUN_VERSION:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      NODE_VERSION:
        description: Nodejs version used to run tests
        required: true
        type: string
        default: 24.14.0
      BUN_VERSION:
        description: Bun version used to run tests
        required: true
        type: string
        default: 1.3.14

jobs:
  cli-tests:
    name: CLI tests
    runs-on: ubuntu-latest
    steps:
    - name: Checks-out repository
      uses: actions/checkout@v6

    - name: Install bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "${{ inputs.BUN_VERSION }}"

    - name: Install pnpm
      # Only needed for the pnpm consumer-install scenario below - docpress's own
      # packageManager field describes bun, so this can't auto-detect a version.
      uses: pnpm/action-setup@v4
      with:
        version: 10.32.0
        run_install: false

    - name: Setup Node.js
      # Only needed for the npm consumer-install scenario below.
      uses: actions/setup-node@v6
      with:
        node-version: "${{ inputs.NODE_VERSION }}"

    - name: Get bun cache directory
      id: bun-cache
      run: |
        echo "CACHE_DIR=$(bun pm cache)" >> "$GITHUB_OUTPUT"

    - name: Cache node files
      uses: actions/cache@v5
      with:
        path: |
          ${{ steps.bun-cache.outputs.CACHE_DIR }}
        key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-${{ runner.arch }}-

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Run cli tests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: ./ci/scripts/run-tests.sh -c 'npm,pnpm,bun'
