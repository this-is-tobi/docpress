name: CI

on:
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    - ready_for_review
    branches:
    - "**"
  workflow_dispatch:

env:
  NODE_VERSION: 24.14.0
  BUN_VERSION: latest

jobs:
  expose-vars:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    outputs:
      NODE_VERSION: ${{ env.NODE_VERSION }}
      BUN_VERSION: ${{ env.BUN_VERSION }}
    steps:
    - name: Exposing env vars
      run: echo "Exposing env vars"

  lint:
    uses: this-is-tobi/github-workflows/.github/workflows/lint-js.yml@v0
    needs:
    - expose-vars
    with:
      RUNTIME_VERSION: ${{ needs.expose-vars.outputs.NODE_VERSION }}
      PACKAGE_MANAGER: pnpm

  tests-unit:
    uses: this-is-tobi/github-workflows/.github/workflows/test-vitest.yml@v0
    needs:
    - expose-vars
    with:
      RUNTIME_VERSION: ${{ needs.expose-vars.outputs.NODE_VERSION }}
      PACKAGE_MANAGER: pnpm
      COVERAGE: true
      COVERAGE_REPORTER: lcov
      TEST_COMMAND: pnpm run test:cov

  tests-cli:
    uses: ./.github/workflows/tests-cli.yml
    needs:
    - expose-vars
    with:
      NODE_VERSION: ${{ needs.expose-vars.outputs.NODE_VERSION }}
      BUN_VERSION: ${{ needs.expose-vars.outputs.BUN_VERSION }}

  build-docker:
    uses: this-is-tobi/github-workflows/.github/workflows/build-docker.yml@v0
    needs:
    - expose-vars
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    with:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/docpress
      IMAGE_TAG: pr-${{ github.event.pull_request.number || github.event.number }}
      IMAGE_DOCKERFILE: ./Dockerfile
      IMAGE_CONTEXT: ./
      IMAGE_TARGET: prod
      USE_QEMU: true
      CACHE: true

  tests-docker:
    uses: ./.github/workflows/tests-docker.yml
    needs:
    - expose-vars
    - build-docker
    with:
      DOCKER_IMAGE: ${{ (github.event.pull_request.number || github.event.number) && format('ghcr.io/{0}/docpress:pr-{1}', github.repository_owner, (github.event.pull_request.number || github.event.number)) || '' }}

  scan-vuln:
    uses: this-is-tobi/github-workflows/.github/workflows/scan-trivy.yml@v0
    if: ${{ !github.event.pull_request.draft && (github.base_ref == 'main' || github.base_ref == 'develop') }}
    needs:
    - build-docker
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      packages: read
    with:
      IMAGE: ghcr.io/${{ github.repository_owner }}/docpress:pr-${{ github.event.pull_request.number || github.event.number }}
      PATH: .
      FORMAT: sarif
      GITHUB_SECURITY_TAB: true
      PR_NUMBER: ${{ format('{0}', github.event.pull_request.number || github.event.number) }}

  # Sonarqube scan - requires vars.SONAR_URL repository variable and SONAR_TOKEN + SONAR_PROJECT_KEY secrets
  code-scan:
    uses: this-is-tobi/github-workflows/.github/workflows/scan-sonarqube.yml@v0
    if: ${{ vars.SONAR_URL != '' }}
    needs:
    - tests-unit
    permissions:
      contents: read
      issues: write
      pull-requests: write
    with:
      SONAR_URL: ${{ vars.SONAR_URL }}
      COVERAGE_IMPORT: true
      SOURCES_PATH: src
      FAIL_ON_ERROR: false
      SONAR_EXTRA_ARGS: >
        -Dsonar.javascript.node.maxspace=4096
        -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        -Dsonar.coverage.exclusions=**/*.spec.js,**/*.spec.ts
        -Dsonar.cpd.exclusions=**/*.spec.js,**/*.spec.ts
    secrets: inherit

  # Workaround for required status check in protection branches (see. https://github.com/orgs/community/discussions/13690)
  all-jobs-passed:
    name: Check jobs status
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
    - expose-vars
    - lint
    - tests-unit
    - tests-cli
    - build-docker
    - tests-docker
    - scan-vuln
    - code-scan
    steps:
    - name: Check status of all required jobs
      run: |-
        NEEDS_CONTEXT='${{ toJson(needs) }}'
        JOB_IDS=$(echo "$NEEDS_CONTEXT" | jq -r 'keys[]')
        for JOB_ID in $JOB_IDS; do
          RESULT=$(echo "$NEEDS_CONTEXT" | jq -r ".[\"$JOB_ID\"].result")
          echo "$JOB_ID job result: $RESULT"
          if [[ $RESULT != "success" && $RESULT != "skipped" ]]; then
            echo "***"
            echo "Error: The $JOB_ID job did not pass."
            exit 1
          fi
        done
        echo "All jobs passed or were skipped."
